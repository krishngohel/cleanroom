version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cleanroom
      POSTGRES_USER: cleanroom
      POSTGRES_PASSWORD: cleanroom
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cleanroom"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://cleanroom:cleanroom@postgres/cleanroom
      OLLAMA_BASE_URL: http://ollama:11434
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      DEBUG: "true"
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:80"]'
    depends_on:
      postgres: {condition: service_healthy}
      ollama: {condition: service_started}
    volumes: [./server:/app]

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.dev
    ports: ["5173:5173"]
    volumes: [./dashboard:/app, /app/node_modules]
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on: [server]

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes: [./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro]
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:11.1.0
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [prometheus]

volumes:
  postgres_data:
  ollama_data:
  grafana_data:

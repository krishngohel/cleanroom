# Default values for cleanroom Helm chart.
# Override with: helm install cleanroom ./infra/helm -f my-values.yaml

global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

nameOverride: ""
fullnameOverride: ""

# ---------------------------------------------------------------------------
# API Server (Python FastAPI)
# ---------------------------------------------------------------------------
server:
  replicaCount: 1

  image:
    repository: cleanroom/server
    tag: "0.1.0"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8000

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

  env:
    DEBUG: "false"

  envFromSecrets:
    - secretName: cleanroom-secrets
      keys:
        - DATABASE_URL
        - JWT_SECRET

  readinessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 10

  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 30

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# ---------------------------------------------------------------------------
# Dashboard (React / nginx)
# ---------------------------------------------------------------------------
dashboard:
  replicaCount: 1

  image:
    repository: cleanroom/dashboard
    tag: "0.1.0"
    pullPolicy: IfNotPresent

  service:
    type: LoadBalancer
    port: 80

  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "250m"

  env:
    VITE_API_URL: "https://api.cleanroom.example.com"

# ---------------------------------------------------------------------------
# Ollama (LLM inference)
# ---------------------------------------------------------------------------
ollama:
  enabled: true

  image:
    repository: ollama/ollama
    tag: "latest"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 11434

  persistence:
    enabled: true
    size: 100Gi
    storageClass: ""

  resources:
    requests:
      memory: "8Gi"
      cpu: "2000m"
    limits:
      memory: "32Gi"
      cpu: "8000m"

  # GPU support — set to number of GPUs available
  gpu:
    enabled: false
    count: 1

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: cleanroom.example.com
      paths:
        - path: /
          pathType: Prefix
          service: dashboard
          port: 80
    - host: api.cleanroom.example.com
      paths:
        - path: /
          pathType: Prefix
          service: server
          port: 8000
  tls: []

# ---------------------------------------------------------------------------
# PostgreSQL subchart (bitnami/postgresql)
# ---------------------------------------------------------------------------
postgresql:
  enabled: true
  auth:
    database: cleanroom
    username: cleanroom
    existingSecret: cleanroom-pg-secret
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  primary:
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "500m"
    persistence:
      enabled: true
      size: 20Gi

# ---------------------------------------------------------------------------
# Secrets (create externally in production)
# ---------------------------------------------------------------------------
secrets:
  create: false
  name: cleanroom-secrets
  data:
    DATABASE_URL: ""
    JWT_SECRET: ""

# ---------------------------------------------------------------------------
# Pod Security
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  annotations: {}
  name: ""

podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

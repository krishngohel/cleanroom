version: "3.9"

# Production overlay — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  ollama:
    restart: unless-stopped
    # Uncomment to enable GPU passthrough (requires nvidia-container-toolkit)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  postgres:
    restart: unless-stopped
    # No port exposure in production — internal only
    ports: []
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"

  server:
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 4
    environment:
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://cleanroom:${POSTGRES_PASSWORD}@postgres/cleanroom
      OLLAMA_BASE_URL: http://ollama:11434
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: '["https://${DOMAIN}"]'
    volumes: []
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 512m

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    volumes: []
    environment:
      VITE_API_URL: https://api.${DOMAIN}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

  prometheus:
    restart: unless-stopped

  grafana:
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_ALLOW_SIGN_UP: "false"

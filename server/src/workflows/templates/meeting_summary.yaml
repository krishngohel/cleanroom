id: meeting_summary
name: Meeting Summary & Action Items
description: Summarizes meeting notes or transcripts and extracts action items with owners.
parameters:
  - name: meeting_title
    type: string
    required: true
    description: "Title or subject of the meeting"
  - name: meeting_date
    type: string
    required: true
    description: "Date of the meeting"
  - name: transcript
    type: text
    required: true
    description: "Meeting notes or transcript text"
connectors: []
prompt_template: |
  You are summarizing a business meeting. Process the following meeting notes and produce a clean summary with clear action items.

  Meeting: {meeting_title}
  Date: {meeting_date}

  Notes/Transcript:
  {transcript}

  {data}

  Produce:
  1. **Meeting Summary** (2-4 sentences capturing the key discussion and decisions)
  2. **Key Decisions Made** (bullet list)
  3. **Action Items** (table format: Action | Owner | Due Date)
  4. **Open Questions** (items that need follow-up or remain unresolved)
output_format: narrative
